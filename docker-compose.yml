services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - coolify
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - "traefik.http.routers.miror-compose.rule=Host(`testujem.cloud`) || Host(`www.testujem.cloud`)"
      - traefik.http.routers.miror-compose.entryPoints=http
      - traefik.http.routers.miror-compose.service=miror-compose
      - traefik.http.services.miror-compose.loadbalancer.server.port=80
networks:
  coolify:
    external: true
